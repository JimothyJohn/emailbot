version = 0.1

[default.deploy.parameters]
stack_name = "emailbot"
resolve_s3 = true
s3_prefix = "emailbot"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "Environment=\"dev\" AnthropicApiKeyParameterName=\"/emailbot/dev/anthropic-api-key\""
image_repositories = []

[default.global.parameters]
region = "us-east-1"
